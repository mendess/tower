[Interface]
# Server address in VPN virtual LAN
Address = 10.0.0.1/24
ListenPort = 51820
PrivateKey = REPLACE__PRIVATE_KEY

PostUp = nft add table inet wg0
PostUp = nft add chain inet wg0 postrouting { type nat hook postrouting priority srcnat \; policy accept \; }
PostUp = nft add rule inet wg0 postrouting oifname "enp4s0" masquerade
PostUp = nft add rule ip filter DOCKER-USER iifname "wg0" accept
PostUp = nft add rule ip filter DOCKER-USER oifname "wg0" accept

PostDown = nft -a list chain ip filter DOCKER-USER | grep '"wg0"' | awk '/handle/ {print $NF}' | xargs -I{} nft delete rule ip filter DOCKER-USER handle {}
PostDown = nft delete table inet wg0


