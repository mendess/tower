#!/usr/bin/nft -f
# vim:set ts=2 sw=2 et:

# IPv4/IPv6 Simple & Safe firewall ruleset.
# More examples in /usr/share/nftables/ and /usr/share/doc/nftables/examples/.

destroy table inet filter
table inet filter {
  chain input {
    type filter hook input priority filter
    policy drop

    ct state invalid drop comment "early drop of invalid connections"
    ct state {established, related} accept comment "allow tracked connections"

    iif lo accept comment "allow from loopback"
    iifname "docker0" accept comment "allow Docker containers to reach host"
    iifname "br-*" accept comment "allow custom Docker networks to reach host"

    ip protocol icmp accept comment "allow icmp"
    meta l4proto ipv6-icmp accept comment "allow icmp v6"

    iifname "enp4s0" udp dport { 67, 68 } accept comment "allow DHCP"

    ip saddr 192.168.42.0/24 accept comment "allow LAN"

    iifname "wg0" ip saddr 10.0.0.0/24 accept comment "allow all WireGuard interface traffic"

    # ex2 filters
    iifname "ex2" ip daddr 10.0.2.1/24 udp dport 53 accept comment "allow DNS from ex2"
    iifname "ex2" ip daddr 10.0.2.1/24 tcp dport 53 accept comment "allow DNS from ex2"
    iifname "ex2" drop

    # fm3 filters
    iifname "fm3" ip daddr 10.0.3.1/24 udp dport { 53, 80, 443 } accept comment "allow DNS and nginx from fm3"
    iifname "fm3" ip daddr 10.0.3.1/24 tcp dport { 53, 80, 443 } accept comment "allow DNS and nginx from fm3"
    iifname "fm3" drop

    # port forwarded ports
    iifname "enp4s0" tcp dport { 22, 80, 443 } accept comment "allow ssh, http, https from anywhere"

    iifname "enp4s0" udp dport { 51820, 51821, 51822, 51823 } accept comment "allow wireguard handshake from anywhere"

    iifname "enp4s0" tcp dport { 50000 } accept comment "allow port-forwarded qbittorrent"
    iifname "enp4s0" udp dport { 50000 } accept comment "allow port-forwarded qbittorrent (udp)"

    iifname "enp4s0" tcp dport { 50001 } accept comment "allow port-forwarded minecraft"
    iifname "enp4s0" udp dport { 50001 } accept comment "allow port-forwarded minecraft (udp)"

    iifname "enp4s0" tcp dport { 50002 } accept comment "allow port-forwarded minecraft voice"
    iifname "enp4s0" udp dport { 50002 } accept comment "allow port-forwarded minecraft voice (udp)"

    pkttype host limit rate 5/second counter reject with icmpx type admin-prohibited
    counter
  }
  chain forward {
    type filter hook forward priority filter
    policy accept

    iifname "ex2" oifname "enp4s0" accept
    iifname "enp4s0" oifname "ex2" ct state established,related accept
    iifname "ex2" drop

    iifname "fm3" oifname "enp4s0" accept
    iifname "enp4s0" oifname "fm3" ct state established,related accept
    iifname "fm3" drop
  }
  chain postrouting {
    type nat hook postrouting priority srcnat
    policy accept

    oifname "enp4s0" masquerade;
  }
}
