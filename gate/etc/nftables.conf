#!/usr/bin/nft -f
# vim:set ts=2 sw=2 et:

# IPv4/IPv6 Simple & Safe firewall ruleset.
# More examples in /usr/share/nftables/ and /usr/share/doc/nftables/examples/.

destroy table inet filter
table inet filter {
  chain input {
    type filter hook input priority filter
    policy drop

    ct state invalid drop comment "early drop of invalid connections"
    ct state {established, related} accept comment "allow tracked connections"
    iif lo accept comment "allow from loopback"
    ip protocol icmp accept comment "allow icmp"
    meta l4proto ipv6-icmp accept comment "allow icmp v6"

    udp dport { 67, 68 } accept comment "allow DHCP"

    ip saddr 192.168.42.0/24 accept comment "allow LAN"

    ip saddr 10.0.0.0/24 accept comment "allow WireGuard/VPN subnet"
    iifname "wg0" accept comment "allow all WireGuard interface traffic"

    # port forwarded ports
    tcp dport { 22, 80, 443 } accept comment "allow ssh, http, https from anywhere"

    udp dport { 51820, 51821 } accept comment "allow wireguard handshake from anywhere"

    tcp dport { 50000 } accept comment "allow port-forwarded qbittorrent"
    udp dport { 50000 } accept comment "allow port-forwarded qbittorrent (udp)"

    tcp dport { 50001 } accept comment "allow port-forwarded minecraft"
    udp dport { 50001 } accept comment "allow port-forwarded minecraft (udp)"

    tcp dport { 50002 } accept comment "allow port-forwarded minecraft voice"
    udp dport { 50002 } accept comment "allow port-forwarded minecraft voice (udp)"
    pkttype host limit rate 5/second counter reject with icmpx type admin-prohibited
    counter
  }
  chain forward {
    type filter hook forward priority filter
    policy accept
  }
}
