#
# Example configuration file.
#
# See unbound.conf(5) man page, version 1.23.1.
#
# this is a comment.

include: "/etc/unbound/unbound.conf.d/cloudflare.conf"
include: "/etc/unbound/unbound.conf.d/local.conf"
include: "/etc/unbound/unbound.conf.d/block.conf"

# The server clause sets the main parameters.
server:
    verbosity: 0
    log-local-actions: no
    log-queries: no
    log-replies: yes
    interface: 0.0.0.0
    interface: ::0
    # Allow localhost
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow
    # Allow LAN clients
    access-control: 192.168.42.0/24 allow
    access-control: 2001:818:e773:e200:6a52:51f9:b694:b488/64 allow
    # Allow WG clients
    access-control: 10.0.0.0/24 allow
    # Local zones for private networks
    private-domain: "lan"
    domain-insecure: "lan"
    do-not-query-localhost: no

    auto-trust-anchor-file: "/etc/unbound/trusted-key.key"
    tls-system-cert: yes

	# the number of slabs to use for the message cache.
	# the number of slabs must be a power of 2.
	# more slabs reduce lock contention, but fragment memory usage.
    # Power of 2 close to num-threads
    num-threads: 4
	# the number of slabs to use for the Infrastructure cache.
	# the number of slabs must be a power of 2.
	# more slabs reduce lock contention, but fragment memory usage.
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
	# the number of slabs to use for the Infrastructure cache.
	# the number of slabs must be a power of 2.
	# more slabs reduce lock contention, but fragment memory usage.
    infra-cache-slabs: 8
	# the number of slabs to use for the key cache.
	# the number of slabs must be a power of 2.
	# more slabs reduce lock contention, but fragment memory usage.
    key-cache-slabs: 8
	# the amount of memory to use for the RRset cache.
	# plain value in bytes or you can append k, m or G. default is "4Mb".
    # More cache memory, rrset=msg*2
    rrset-cache-size: 256m
	# the amount of memory to use for the message cache.
	# plain value in bytes or you can append k, m or G. default is "4Mb".
    msg-cache-size: 128m
	# number of ports to allocate per thread, determines the size of the
	# port range that can be open simultaneously.  About double the
	# num-queries-per-thread, or, use as many as the OS will allow you.
    outgoing-range: 8192
	# the number of queries that a thread gets to service.
    num-queries-per-thread: 4096
	# buffer size for UDP port 53 incoming (SO_RCVBUF socket option).
	# 0 is system default.  Use 4m to catch query spikes for busy servers.
    so-rcvbuf: 4m
	# buffer size for UDP port 53 outgoing (SO_SNDBUF socket option).
	# 0 is system default.  Use 4m to handle spikes on very busy servers.
    so-sndbuf: 4m

    # Ensure kernel buffer is large enough
    so-reuseport: yes

    # Privacy and security settings
    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes

	# Serve expired responses from cache, with serve-expired-reply-ttl in
	# the response. By default it first tries to refresh an expired answer.
	# Can be configured with serve-expired-client-timeout.
    serve-expired: yes
	# Limit serving of expired responses to configured seconds after
	# expiration. 0 disables the limit.
    serve-expired-ttl: 86400
    # Minimize queries sent to authoritative servers
	# Sent minimum amount of information to upstream servers to enhance
	# privacy. Only sent minimum required labels of the QNAME and set QTYPE
	# to A when possible.
    qname-minimisation: yes
	# QNAME minimisation in strict mode. Do not fall-back to sending full
	# QNAME to potentially broken nameservers. A lot of domains will not be
	# resolvable when this option in enabled.
	# This option only has effect when qname-minimisation is enabled.
    qname-minimisation-strict: yes
	# Aggressive NSEC uses the DNSSEC NSEC chain to synthesize NXDOMAIN
	# and other denials, using information from previous NXDOMAINs answers.
    aggressive-nsec: yes

# Remote control config section.
remote-control:
    control-enable: no
