tv_sleep_timer:
  sequence:
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id: switch.tv_screen_switch
    data: {}
  - action: timer.start
    metadata: {}
    target:
      entity_id: timer.sleep_timer
    data: {}
  - wait_for_trigger:
    - trigger: state
      entity_id:
      - timer.sleep_timer
      to:
      - idle
    continue_on_timeout: false
    timeout:
      hours: 0
      minutes: 40
      seconds: 0
      milliseconds: 0
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.aramathinewall_power_button
  alias: TV sleep timer
  description: ''
  icon: mdi:sleep
turn_on_tolaria_w_steam_if_tolaria_is_off:
  sequence:
  - if:
    - condition: state
      entity_id: switch.tolaria
      state:
      - 'off'
    then:
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id: switch.tolaria
      data: {}
    else:
    - action: shell_command.tolaria_turn_on_steam
      metadata: {}
      data: {}
  alias: 'tolaria: start remote steam'
  description: ''
boot_to_source:
  sequence:
  - action: switch.turn_on
    metadata: {}
    target:
      entity_id: switch.aramathinewall_power_button
    data: {}
  - alias: wait for tv to turn on
    wait_template: '{{ is_state("switch.aramathinewall_power_button", "on") }}'
    continue_on_timeout: false
    timeout:
      hours: 0
      minutes: 2
      seconds: 0
      milliseconds: 0
  - if:
    - condition: template
      value_template: '{{ (volume | default(None)) is not none }}'
    then:
    - action: media_player.volume_set
      metadata: {}
      target:
        entity_id: media_player.aramanthinewall
      data:
        volume_level: '{{ (volume | default(0)) | float }}'
    alias: if volume was passed
  - action: media_player.select_source
    metadata: {}
    data:
      source: '{{ source }}'
    target:
      device_id: b5098e373bea279a182da7c91e908c4f
  - wait_template: '{{ is_state_attr("media_player.aramanthinewall", "source", source)
      }}'
    continue_on_timeout: false
    timeout:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
    alias: wait for source to change to {{ source }}
  alias: Boot to source
  description: ''
  icon: mdi:import
  fields:
    source:
      selector:
        text: {}
    volume:
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
  mode: restart
privacy:
  sequence:
  - action: cover.set_cover_position
    metadata: {}
    target:
      entity_id: cover.estores_varanda_direira
    data:
      position: 30
  - action: cover.set_cover_position
    metadata: {}
    data:
      position: 30
    target:
      entity_id: cover.estores_varanda_esquerda
  alias: Privacy
  description: ''
