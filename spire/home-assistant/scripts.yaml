tv_sleep_timer:
  sequence:
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id: switch.tv_screen_switch
    data: {}
  - delay:
      hours: 0
      minutes: 30
      seconds: 0
      milliseconds: 0
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.aramathinewall_power_button
  alias: TV sleep timer
  description: ''
  icon: mdi:sleep
turn_on_tolaria_w_steam_if_tolaria_is_off:
  sequence:
  - if:
    - condition: state
      entity_id: switch.wake_on_lan
      state:
      - 'off'
    then:
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id: switch.wake_on_lan
      data: {}
    else:
    - action: shell_command.tolaria_turn_on_steam
      metadata: {}
      data: {}
  alias: 'tolaria: start remote steam'
  description: ''
boot_to_source:
  sequence:
  - action: switch.turn_on
    metadata: {}
    target:
      entity_id: switch.aramathinewall_power_button
    data: {}
  - alias: wait for tv to turn on
    wait_template: '{{ is_state("switch.aramathinewall_power_button", "on") }}'
    continue_on_timeout: false
    timeout:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
  - action: media_player.select_source
    metadata: {}
    data:
      source: '{{ source }}'
    target:
      device_id: b5098e373bea279a182da7c91e908c4f
  - wait_template: '{{ is_state_attr("media_player.aramanthinewall", "source", source)
      }}'
    continue_on_timeout: false
    timeout:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
    alias: wait for source to change to {{ source }}
  alias: Boot to source
  description: ''
  icon: mdi:import
  fields:
    source:
      selector:
        text: {}
  mode: restart
