tv_sleep_timer:
  sequence:
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id: switch.tv_screen_switch
    data: {}
  - delay:
      hours: 0
      minutes: 30
      seconds: 0
      milliseconds: 0
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.aramathinewall_power_button
  alias: TV sleep timer
  description: ''
  icon: mdi:sleep
turn_on_tolaria_w_steam_if_tolaria_is_off:
  sequence:
  - if:
    - condition: state
      entity_id: switch.wake_on_lan
      state:
      - 'off'
    then:
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id: switch.wake_on_lan
      data: {}
    else:
    - action: shell_command.tolaria_turn_on_steam
      metadata: {}
      data: {}
  alias: 'tolaria: start remote steam'
  description: ''
