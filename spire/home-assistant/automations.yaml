- id: '1775381062641'
  alias: Close estores when night falls
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.night_time
    to:
    - 'off'
  conditions: []
  actions:
  - action: cover.close_cover
    metadata: {}
    data: {}
    target:
      label_id: estores_all
    enabled: false
  - repeat:
      for_each: '{{ state_attr(''cover.estores_todos'', ''entity_id'') | sort }}'
      sequence:
      - action: cover.close_cover
        metadata: {}
        target:
          entity_id: '{{ repeat.item }}'
        data: {}
      - wait_template: '{{ state_attr(repeat.item, ''current_position'') == 0 }}'
        continue_on_timeout: true
        timeout:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
  mode: single
