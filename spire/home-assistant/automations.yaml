    - condition: state
      entity_id: binary_sensor.ornithopter_connected_to_xm5
      state:
      - 'on'
  actions:
  - action: script.wake_aramanthinewall
    metadata: {}
    data: {}
  mode: single
- id: '1771331270206'
  alias: Leave home
  description: ''
