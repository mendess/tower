- id: '1775383359573'
  alias: Stopped watching tv
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.gaming_mode
    to:
    - 'off'
  - trigger: state
    entity_id:
    - media_player.aramanthinewall
    attribute: source
    to:
    - PC
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: state
    entity_id: binary_sensor.night_time
    state:
    - 'on'
  - condition: state
    entity_id: switch.aramathinewall_power_button
    state:
    - 'on'
  - condition: state
    entity_id: input_boolean.gaming_mode
    state:
    - 'off'
  actions:
  - action: cover.open_cover
    metadata: {}
    target:
      label_id: estores_sala
    data: {}
  mode: single
- id: '1775386644374'
  alias: Stop Gaming mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.gaming_mode
    to:
    - 'off'
  conditions: []
  actions:
  - action: media_player.volume_set
    metadata: {}
    target:
      entity_id: media_player.aramanthinewall
    data:
      volume_level: 0.1
  - parallel:
    - action: shell_command.host_run
      metadata: {}
      data:
        command: /usr/local/bin/fade-in-music
      alias: Fade in music
    - action: shell_command.tolaria_restore_resolution
      metadata: {}
      data: {}
  mode: single
- id: '1775574119677'
  alias: Backup Alert Notification
  description: ''
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: true
    webhook_id: backup-notification
  conditions: []
  actions:
  - action: persistent_notification.create
    metadata: {}
    data:
      title: Backup Alert for {{ trigger.json.repository }}
      message: '{{ trigger.json.message }}'
  - action: notify.mobile_app_ornithopter
    metadata: {}
    data:
      message: '{{ trigger.json.message }}'
      title: Backup Alert for {{ trigger.json.repository }}
  mode: single
- id: '1775574197183'
  alias: latest-backup-update
  description: ''
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: true
    webhook_id: latest-backup-update
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ "local" in trigger.json.repository }}'
      sequence:
      - action: input_datetime.set_datetime
        metadata: {}
        target:
          entity_id: input_datetime.latest_backup_local
        data:
          datetime: '{{ now() }}'
    - conditions:
      - condition: template
        value_template: '{{ "flopy" in trigger.json.repository }}'
      sequence:
      - action: input_datetime.set_datetime
        metadata: {}
        data:
          datetime: '{{ now() }}'
        target:
          entity_id: input_datetime.latest_backup_flopy
  mode: single
- id: '1776161237853'
  alias: Smart Wake up
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - event.sleep_as_android_smart_wake_up
    attribute: event_type
    to:
    - before_smart_period
    for:
      hours: 0
      minutes: 30
      seconds: 0
  conditions:
  - condition: zone
    entity_id: person.mendess
    zone: zone.home
  actions:
  - action: cover.set_cover_position
    metadata: {}
    data:
      position: 10
    target:
      entity_id: cover.estores_quarto_wc
  mode: single
- id: '1776261226221'
  alias: Abrir estores quando o alarme toca
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - event.sleep_as_android_alarm_clock
    attribute: event_type
    to:
    - alert_start
  conditions:
  - condition: zone
    entity_id: person.mendess
    zone: zone.home
  actions:
  - repeat:
      while:
      - condition: numeric_state
        entity_id: cover.estores_quarto_wc
        attribute: current_position
        below: 100
      sequence:
      - action: cover.set_cover_position
        metadata: {}
        target:
          entity_id: cover.estores_quarto_wc
        data:
          position: '{{ min(100, (state_attr(''cover.estores_quarto_wc'', ''current_position'')
            + 10)) }}'
      - delay:
          hours: 0
          minutes: 2
          seconds: 0
          milliseconds: 0
  mode: single
- id: '1776289999583'
  alias: turn off tv when sleeping
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - event.sleep_as_android_sleep_tracking
  conditions: []
  actions:
  - action: switch.turn_off
    metadata: {}
    target:
      entity_id: switch.aramathinewall_power_button
    data: {}
  mode: single
- id: '1776790105614'
  alias: Ver as noticias quando acordo
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - event.sleep_as_android_alarm_clock
    attribute: event_type
    to:
    - alert_dismiss
    for:
      hours: 0
      minutes: 10
      seconds: 0
  conditions:
  - condition: time
    before: 09:30:00
  - condition: state
    entity_id: person.mendess
    state:
    - home
  actions:
  - action: script.boot_to_source
    metadata: {}
    data:
      source: Live TV
  - action: media_player.volume_set
    metadata: {}
    target:
      device_id: b5098e373bea279a182da7c91e908c4f
    data:
      volume_level: 0.1
  - action: webostv.button
    metadata: {}
    data:
      entity_id: media_player.aramanthinewall
      button: '6'
  mode: single
