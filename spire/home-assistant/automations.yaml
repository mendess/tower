- id: '1772244305879'
  alias: Start Gaming Mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.gaming_mode
    id: 'on'
    to:
    - 'on'
  - trigger: state
    entity_id:
    - input_boolean.gaming_mode
    to:
    - 'off'
    id: 'off'
  conditions: []
  actions:
  - if:
    - condition: trigger
      id:
      - 'on'
    then:
    - action: script.turn_on_tolaria_w_steam_if_tolaria_is_off
      metadata: {}
      data: {}
      enabled: true
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id:
        - switch.tv_screen_switch
      data: {}
    - action: script.boot_to_source
      metadata: {}
      data:
        source: PC
    - action: shell_command.host_run
      metadata: {}
      data:
        command: /usr/bin/shyprctl l flatpak run com.valvesoftware.SteamLink
      alias: start steam link
    - alias: wait for tolaria to come online
      wait_template: '{{ is_state("switch.tolaria", "on") }}'
      continue_on_timeout: true
    - parallel:
      - repeat:
          while:
          - condition: numeric_state
            entity_id: media_player.aramanthinewall
            attribute: volume_level
            above: 0.25
          sequence:
          - action: media_player.volume_down
            metadata: {}
            target:
              entity_id: media_player.aramanthinewall
            data: {}
          - delay:
              hours: 0
              minutes: 0
              seconds: 1
              milliseconds: 0
        alias: reduce tv volume to 25
      - action: shell_command.host_run
        metadata: {}
        data:
          command: /usr/local/bin/fade-out-music
        alias: Fade out music
      alias: fade out music
    - repeat:
        while:
        - condition: numeric_state
          entity_id: media_player.aramanthinewall
          attribute: volume_level
          below: 0.25
        sequence:
        - action: media_player.volume_up
          metadata: {}
          target:
            entity_id: media_player.aramanthinewall
          data: {}
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
      alias: bring tv volume up to 25
    else:
    - action: media_player.volume_set
      metadata: {}
      target:
        entity_id: media_player.aramanthinewall
      data:
        volume_level: 0.1
    - parallel:
      - action: shell_command.host_run
        metadata: {}
        data:
          command: /usr/local/bin/fade-in-music
        alias: Fade in music
      - action: shell_command.tolaria_restore_resolution
        metadata: {}
        data: {}
      alias: fade in music and restore tolaria resolution
  mode: restart
