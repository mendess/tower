- id: '1776261226221'
  alias: Abrir estores quando o alarme toca
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - event.sleep_as_android_alarm_clock
    attribute: event_type
    to:
    - alert_start
  conditions:
  - condition: zone
    entity_id: person.mendess
    zone: zone.home
  actions:
  - repeat:
      while:
      - condition: numeric_state
        entity_id: cover.estores_quarto_wc
        attribute: current_position
        below: 100
      sequence:
      - action: cover.set_cover_position
        metadata: {}
        target:
          entity_id: cover.estores_quarto_wc
        data:
          position: '{{ min(100, (state_attr(''cover.estores_quarto_wc'', ''current_position'')
            + 10)) }}'
      - delay:
          hours: 0
          minutes: 2
          seconds: 0
          milliseconds: 0
      - condition: state
        state:
        - stopped
        - paused
        entity_id: event.sleep_as_android_sleep_tracking
        attribute: event_type
  mode: single
