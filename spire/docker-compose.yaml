services:
  homer:
    image: b4bz/homer
    container_name: homer
    volumes:
      - ${DB_DIR}/spire/homer:/www/assets
    ports:
      - 1025:8080
    restart: unless-stopped
    user: ${PUID}:${PGID}

  nextcloud-mariadb:
    image: mariadb:10.6
    container_name: nextcloud-mariadb
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - ${DB_DIR}/spire/nextcloud/mariadb:/var/lib/mysql:Z
      - /run/user/${PUID}:/run/user/${PUID} # mount the runtime dir so that brogmatic can export the database correctly
    # user: ${PUID}:${PGID}
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_MARIADB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${NEXTCLOUD_MARIADB_DB_PASSWORD}
      MYSQL_DATABASE: ${NEXTCLOUD_MARIADB_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_MARIADB_USER}
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_DISABLE_UPGRADE_BACKUP: 1

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: unless-stopped

  nextcloud-cron:
    image: nextcloud:apache
    container_name: nextcloud-cron
    restart: unless-stopped
    # user: ${PUID}:${PGID}
    volumes:
      - ${DB_DIR}/spire/nextcloud/data:/var/www/html:z
    entrypoint: /cron.sh
    depends_on:
      - nextcloud-mariadb
      - nextcloud-redis

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    # user: ${PUID}:${PGID} # nextcloud uses specific non root users
    ports:
      - 8085:80
    volumes:
      - ${DB_DIR}/spire/nextcloud/data:/var/www/html:z
      - ${DB_DIR}/spire/nextcloud/backups:/backups
    environment:
      TZ: ${TZ}
      MYSQL_PASSWORD: ${NEXTCLOUD_MARIADB_DB_PASSWORD}
      MYSQL_DATABASE: ${NEXTCLOUD_MARIADB_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_MARIADB_DB_NAME}
      MYSQL_HOST: nextcloud-mariadb
      REDIS_HOST: nextcloud-redis
      # NEXTCLOUD_TRUSTED_DOMAINS: cloud.${WEBSITE}
      # OVERWRITECLIURL: https://cloud.${WEBSITE}
      # OVERWRITEPROTOCOL: https
    depends_on:
      - nextcloud-mariadb
      - nextcloud-redis

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ${CONFIG_DIR}/spire/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
      - /run/user/${PUID}/hass-bridge:/hass-bridge
    restart: unless-stopped
    privileged: true
    cap_add:
    - NET_ADMIN
    - NET_RAW
    environment:
      TZ: ${TZ}
    network_mode: "host"
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    user: ${PUID}:${PGID}
    ports:
      - 1883:1883
      - 1884:1884
    volumes:
      - ${DB_DIR}/spire/mosquitto/config:/mosquitto/config
      - ${DB_DIR}/spire/mosquitto/data:/mosquitto/data
      - ${DB_DIR}/spire/mosquitto/log:/mosquitto/log
    restart: unless-stopped
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt
    restart: unless-stopped
    volumes:
        - ${DB_DIR}/spire/zigbee2mqtt/data:/app/data
        - /run/udev:/run/udev:ro
    ports:
        - 8124:8080
    environment:
        - TZ={TZ}
    devices:
        - /dev/serial/by-id/usb-SONOFF_SONOFF_Dongle_Plus_MG24_e4e582f637a2ef11afaa8c6661ce3355-if00-port0:/dev/ttyACM0

